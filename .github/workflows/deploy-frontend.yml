name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/types/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/jourdanmauricio/turno-ya-web:latest
          no-cache: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Trigger Coolify deploy
        run: |
          curl -s -X GET "${{ secrets.COOLIFY_WEB_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Warm up server
        run: |
          echo "Waiting for server to restart..."
          sleep 30
          BASE="https://turnos.lumau.com.ar"
          ROUTES="/login /totem /display /operador /admin /mobile"
          for route in $ROUTES; do
            echo "Warming up $route"
            curl -s -o /dev/null -w "%{http_code} $route\n" "$BASE$route" || true
          done
